<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">

    <h1 class="mb-4">My Spring Portfolio</h1>

    <!-- Fund Summary -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <h6 class="card-title">Total Fund</h6>
                    <h4>$<span th:text="${#numbers.formatDecimal(totalFund, 1, 2)}"></span></h4>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-danger">
                <div class="card-body">
                    <h6 class="card-title">Total Invested</h6>
                    <h4>$<span th:text="${#numbers.formatDecimal(totalInvested, 1, 2)}"></span></h4>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h6 class="card-title">Remaining Fund</h6>
                    <h4>$<span th:text="${#numbers.formatDecimal(remainingFund, 1, 2)}"></span></h4>
                </div>
            </div>
        </div>
    </div>

    <!-- Add to Fund -->
    <div class="card mb-4">
        <div class="card-body">
            <h5>Add to Fund</h5>
            <form th:action="@{/investments/add-to-fund}" method="post" class="d-flex gap-2">
                <label>
                    <input type="number" name="amount" class="form-control" style="width: 300px" placeholder="Amount in USD" min="1" required>
                </label>
                <button type="submit" class="btn btn-success">Add Funds</button>
            </form>
        </div>
    </div>

    <!-- Sort + Add button -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <form th:action="@{/investments}" method="get" class="d-flex gap-2">
            <label>
                <select name="sortBy" class="form-select w-auto">
                    <option value="default">Sort by...</option>
                    <option value="amountAsc"  th:selected="${sortBy == 'amountAsc'}">Amount: Low to High</option>
                    <option value="amountDesc" th:selected="${sortBy == 'amountDesc'}">Amount: High to Low</option>
                    <option value="nameAsc"    th:selected="${sortBy == 'nameAsc'}">Name: A to Z</option>
                </select>
            </label>
            <button type="submit" class="btn btn-outline-secondary">Sort</button>
        </form>
        <a th:href="@{/investments/new}" class="btn btn-primary">+ New Investment</a>
    </div>

    <!-- Investments Table -->
    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Amount</th>
                    <th>Description</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="inv : ${investments}">
                    <td th:text="${inv.id}"></td>
                    <td th:text="${inv.name}"></td>
                    <td>$<span th:text="${#numbers.formatDecimal(inv.amount, 1, 2)}"></span></td>
                    <td th:text="${inv.description}"></td>
                    <td th:text="${#temporals.format(inv.createdAt, 'dd MMM yyyy')}"></td>
                    <td>
                        <a th:href="@{/investments/{id}(id=${inv.id})}" class="btn btn-sm btn-info">View</a>
                        <a th:href="@{/investments/{id}/edit(id=${inv.id})}" class="btn btn-sm btn-warning">Edit</a>
                        <form th:action="@{/investments/{id}/delete(id=${inv.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-danger"
                                    onclick="return confirm('Delete this investment?')">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
