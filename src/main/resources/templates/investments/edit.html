<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Investment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <a th:href="@{/investments}" class="btn btn-secondary mb-3">← Back</a>
    <div class="card">
        <div class="card-body">
            <h3>Edit Investment Name</h3>
            <form th:action="@{/investments/{id}/edit(id=${investment.id})}" method="post">
                <div class="mb-3">
                    <label class="form-label">Investment Name</label>
                    <label>
                        <input type="text" name="name" th:value="${investment.name}" class="form-control" required>
                    </label>
                </div>
                <button type="submit" class="btn btn-warning">Update Name</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
