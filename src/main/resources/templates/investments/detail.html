<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" >
<head>
    <meta charset="UTF-8">
    <title>Investment Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <a th:href="@{/investments}" class="btn btn-secondary mb-3">← Back</a>
    <div class="card">
        <div class="card-body">
            <h2 th:text="${investment.name}"></h2>
            <hr>
            <p><strong>Amount:</strong> $<span th:text="${#numbers.formatDecimal(investment.amount, 1, 2)}"></span></p>
            <p><strong>Description:</strong> <span th:text="${investment.description}"></span></p>
            <p><strong>Date Added:</strong> <span th:text="${#temporals.format(investment.createdAt, 'dd MMM yyyy HH:mm')}"></span></p>
            <a th:href="@{/investments/{id}/edit(id=${investment.id})}" class="btn btn-warning">Edit Name</a>
        </div>
    </div>
</div>
</body>
</html>
