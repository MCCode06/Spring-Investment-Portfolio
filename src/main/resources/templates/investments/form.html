<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Investment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <a th:href="@{/investments}" class="btn btn-secondary mb-3">← Back</a>
    <div class="card">
        <div class="card-body">
            <h3>New Investment</h3>
            <form th:action="@{/investments}" th:object="${investment}" method="post">
                <div class="mb-3">
                    <label class="form-label">Investment Name</label>
                    <label>
                        <input type="text" th:field="*{name}" class="form-control">
                    </label>
                    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
                </div>
                <div class="mb-3">
                    <label class="form-label">Amount (USD)</label>
                    <label>
                        <input type="number" th:field="*{amount}" class="form-control" step="0.01" min="1">
                    </label>
                    <span th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}" class="text-danger"></span>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description (optional)</label>
                    <label>
                        <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" onclick="localStorage.setItem('lastInvestmentTime', Date.now().toString())">
                    Save Investment
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
